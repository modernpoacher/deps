version: 2.1

jobs:
  lint_and_test:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run:
          name: Install
          command: npm i
      - run:
          name: Lint
          command: npm run lint
      - run:
          name: Test
          command: npm test
  publish:
    docker:
      - image: cimg/node:lts
    steps:
      - checkout
      - run:
          name: Publish to npm
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npm publish --access public

workflows:
  commit-workflow:
    jobs:
      - lint_and_test:
          filters:
            branches:
              only: main
      - publish:
          requires:
            - lint_and_test
          filters:
            tags:
              only: /^v.*/
